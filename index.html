<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goaradio</title>

  <!-- icofont-css-link -->
  <link rel="stylesheet" href="css/icofont.min.css">
  <!-- Owl-Carosal-Style-link -->
  <link rel="stylesheet" href="css/owl.carousel.min.css">
  <!-- Bootstrap-Style-link -->
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <!-- Aos-Style-link -->
  <link rel="stylesheet" href="css/aos.css">
  <!-- Coustome-Style-link -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Responsive-Style-link -->
  <link rel="stylesheet" href="css/responsive.css">
  <!-- Favicon -->
  <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

  <style>
    /* ── GLOBAL: black background, white text ── */
    body {
      background-color: #0a0a0a !important;
      color: #ffffff !important;
    }

    /* ── HEADER ── */
    header {
      background-color: #0a0a0adc !important;
      border-bottom: 1px solid #2a2a2a !important;
    }

    .navbar-expand-lg .navbar-nav .nav-link {
      color: #ffffff !important;
    }

    .navbar-expand-lg .navbar-nav .nav-link:hover {
      color: #d4a017 !important;
    }

    /* hamburger bars */
    .toggle-bar,
    .toggle-bar::before,
    .toggle-bar::after {
      border-top-color: #ffffff !important;
      background: #ffffff !important;
    }

    /* ── BANNER SECTION ── */
    .banner_section {
      background-color: #0a0a0a;
    }

    /* remove the yellow-dot background image */
    .banner_section::before {
      display: none;
    }

    /* typed rotating text */
    .banner_section .banner_text .type-wrap span,
    .typed-cursor {
      color: #d4a017 !important;
    }

    /* h1 normal text */
    .banner_section .banner_text h1 {
      color: #ffffff !important;
    }

    /* h1 highlighted span */
    .banner_section .banner_text h1 span {
      color: #d4a017 !important;
    }

    /* body paragraph text */
    .banner_section .banner_text p,
    .banner_section .used_app p {
      color: #cccccc !important;
    }

    /* "Growing Fast" heading */
    .banner_section .used_app h3 {
      color: #ffffff !important;
    }

    /* ── DOWNLOAD BUTTONS: black bg, gold border, gold-tinted images ── */
    .banner_section .app_btn li a {
      background-color: #111111 !important;
      border: 1px solid #d4a017 !important;
    }

    .banner_section .app_btn li a img {
      filter: brightness(0) saturate(100%) invert(68%) sepia(60%) saturate(700%) hue-rotate(5deg) brightness(95%) contrast(95%);
    }

    /* ── SPIN BLOCK ── */
    .spinBlock::before {
      background-color: #333333 !important;
    }

    .spinBlock .spin_box {
      background-color: #1a1a1a !important;
      border: 1px solid #d4a017;
    }

    .spinBlock .spin_box .downsign {
      background-color: #d4a017 !important;
      color: #000000 !important;
    }

    .spinBlock .star img {
      filter: brightness(0) saturate(100%) invert(68%) sepia(60%) saturate(700%) hue-rotate(5deg) brightness(95%);
    }

    /* ── TITLE BADGE ── */
    .title_badge {
      background-color: #d4a017 !important;
      color: #000000 !important;
    }

    /* ── PRELOADER ── */
    #preloader {
      background-color: #0a0a0a !important;
    }

    #loader {
      border-top-color: #d4a017 !important;
    }

    #loader:before {
      border-top-color: #ffffff !important;
    }

    #loader:after {
      border-top-color: #444444 !important;
    }

    /* ── GO TOP BUTTON ── */
    .go_top span {
      background-color: #d4a017 !important;
      color: #000000 !important;
    }
  </style>

</head>

<body>

  <!-- Preloader -->
  <div id="preloader">
    <div id="loader"></div>
  </div>

  <!-- Header Start -->
  <header>
    <!-- container start -->
    <div class="container">
      <!-- navigation bar -->
      <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="index.html">
          <img src="images/splash-icon.png" alt="Logo">
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon">
            <span class="toggle-wrap">
              <span class="toggle-bar"></span>
            </span>
          </span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ml-auto">
            <li class="nav-item active">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="">About Us</a>
            </li>
          </ul>
        </div>
      </nav>
    </div>
    <!-- container end -->
  </header>

  <!-- Banner-Section-Start -->
  <section class="banner_section">
    <!-- container start -->
    <div class="container">
      <!-- row start -->
      <div class="row">
        <div class="col-lg-6 col-md-12" data-aos="fade-up" data-aos-duration="1500">
          <!-- banner text -->
          <div class="banner_text">
            <!-- typed text -->
            <div class="type-wrap">
              <span id="typed" style="white-space:pre;" class="typed">
              </span>
            </div>
            <!-- h1 -->
            <h1>The streaming platform <span>that pays everyone</span></h1>
            <!-- p -->
            <p>
              Stream music, earn rewards. Whether you make it or love it, Goaradio puts money back in your pocket.
            </p>
          </div>

          <!-- users -->
          <div class="used_app">
            <ul>
              <li><img src="images/banavt1.png" alt="image"></li>
              <li><img src="images/banavt2.png" alt="image"></li>
              <li><img src="images/banavt3.png" alt="image"></li>
              <li>
                <a href="#" class="popup-youtube play-button"
                  data-url="https://www.youtube.com/embed/tgbNymZ7vqY?autoplay=1&mute=1" data-toggle="modal" data-target="#myModal" title="XJj2PbenIsU"><img src="images/play.svg" alt="img"></a>
              </li>
            </ul>
            <h3>Growing Fast</h3>
            <p>Listeners earn. Artists earn. <br> Everyone wins on Goaradio.</p>
          </div>

          <!-- app buttons -->
          <ul class="app_btn">
            <li>
              <a href="#">
                <img class="blue_img" src="images/googleplay.png" alt="image">
              </a>
            </li>
            <li>
              <a href="#">
                <img class="blue_img" src="images/appstorebtn.png" alt="image">
              </a>
            </li>
          </ul>
        </div>

        <!-- banner image start -->
        <div class="col-lg-6 col-md-12">
          <div class="banner_slider">
            <img src="images/bannerScreen.png" alt="image" style="max-width: 260px; width: 100%; height: auto; display: block; margin: 0 auto;">
          </div>
        </div>
        <!-- banner image end -->

      </div>
      <!-- row end -->
      <!-- Spin Diveder Start -->
      <div class="spinBlock" data-aos="fade-up" data-aos-duration="1500">
        <span class="star"><img src="images/smallStar.png" alt="image"></span>
        <div class="spin_box" id="scrollButton">
          <span class="downsign">
            <i class="icofont-long-arrow-down"></i>
          </span>
          <div class="spin-text">
            <img src="images/12mtext.png" alt="image">
          </div>
        </div>
        <span class="star"><img src="images/smallStar.png" alt="image"></span>
      </div>
      <!-- Spin Diveder End -->
    </div>
    <!-- container end -->
  </section>
  <!-- Banner-Section-end -->

  <!-- Video Model Start -->
  <div class="modal fade youtube-video" id="myModal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <button id="close-video" type="button" class="button btn btn-default text-right" data-dismiss="modal">
          <i class="icofont-close-line-circled"></i>
        </button>
        <div class="modal-body">
          <div id="video-container" class="video-container">
            <iframe id="youtubevideo" width="640" height="360" allowfullscreen></iframe>
          </div>
        </div>
        <div class="modal-footer">
        </div>
      </div>
    </div>
  </div>
  <!-- Video Model End -->

  <!-- go top button -->
  <div class="go_top" id="Gotop">
    <span><i class="icofont-arrow-up"></i></span>
  </div>

  <!-- Jquery-js-Link -->
  <script src="js/jquery.js"></script>
  <!-- owl-js-Link -->
  <script src="js/owl.carousel.min.js"></script>
  <!-- bootstrap-js-Link -->
  <script src="js/bootstrap.min.js"></script>
  <!-- aos-js-Link -->
  <script src="js/aos.js"></script>
  <!-- Typed Js Cdn -->
  <script src='js/typed.min.js'></script>
  <!-- main-js-Link -->
  <script src="js/main.js"></script>

  <script>
    $("#typed").typed({
      strings: ["Stream. Earn. Repeat.", "Music that pays you back.", "Your fans. Your revenue."],
      typeSpeed: 100,
      startDelay: 0,
      backSpeed: 60,
      backDelay: 2000,
      loop: true,
      cursorChar: "|",
      contentType: 'html'
    });

    $(document).ready(function () {
      let cardBlock = document.querySelectorAll('.task_block');
      let topStyle = 120;
      cardBlock.forEach((card) => {
        card.style.top = `${topStyle}px`;
        topStyle += 30;
      });
    });

    $(document).ready(function () {
      $('#scrollButton').click(function () {
        $('html, body').animate({ scrollTop: $(window).scrollTop() + 600 }, 800);
      });
    });
  </script>

</body>

</html>
